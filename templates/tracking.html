<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SME-Eye Güvenli Takip</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: "#050711",
            panel: "#0b1020",
            line: "#1f2a44",
            cyan: "#22d3ee",
            signal: "#34d399"
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-void text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-2xl flex-col justify-center px-4 py-8">
    <section class="rounded-lg border border-line bg-panel p-5 shadow-2xl shadow-black/30 sm:p-7">
      <div class="flex flex-col gap-3 border-b border-line pb-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-xs uppercase tracking-[0.28em] text-cyan" data-i18n="subtitle">Secure Delivery Verification</p>
          <h1 class="mt-2 text-3xl font-semibold text-white" data-i18n="title">SME-Eye Takip</h1>
        </div>
        <div class="flex items-center gap-3">
          <select id="languageSelect" class="rounded-md border border-line bg-[#070b16] px-3 py-2 text-sm text-white outline-none ring-cyan/50 focus:ring-2">
            <option value="en">EN</option>
            <option value="tr">TR</option>
          </select>
          <a href="/dashboard" class="text-sm text-slate-400 transition hover:text-cyan" data-i18n="admin">Yönetim</a>
        </div>
      </div>

      <form id="lookupForm" class="mt-6 grid gap-3">
        <input id="orderId" type="number" min="1" class="rounded-md border border-line bg-[#070b16] px-3 py-3 text-base text-white outline-none ring-cyan/50 focus:ring-2" placeholder="Sipariş ID" data-i18n-placeholder="orderId" required>
        <input id="cryptoToken" class="rounded-md border border-line bg-[#070b16] px-3 py-3 text-base text-white outline-none ring-cyan/50 focus:ring-2" placeholder="Teslimat tokeni" data-i18n-placeholder="deliveryToken" required>
        <button class="rounded-md bg-cyan px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-cyan/80" data-i18n="viewStatus">Durumu Gör</button>
      </form>

      <div id="statusPanel" class="mt-5 hidden rounded-lg border border-line bg-[#070b16] p-4"></div>

      <form id="feedbackForm" class="mt-5 hidden grid gap-3">
        <select id="cargoRating" class="rounded-md border border-line bg-[#070b16] px-3 py-3 text-base text-white outline-none ring-cyan/50 focus:ring-2" required>
          <option value="5">5 - Çok iyi</option>
          <option value="4">4 - İyi</option>
          <option value="3">3 - Orta</option>
          <option value="2">2 - Kötü</option>
          <option value="1">1 - Çok kötü</option>
        </select>
        <textarea id="customerFeedback" rows="4" class="rounded-md border border-line bg-[#070b16] px-3 py-3 text-base text-white outline-none ring-cyan/50 focus:ring-2" placeholder="Paket sorunsuz geldi veya hasarı açıklayın." data-i18n-placeholder="feedback" required></textarea>
        <button class="rounded-md bg-signal px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-signal/80" data-i18n="submitFeedback">Teslimat Geri Bildirimi Gönder</button>
      </form>

      <form id="returnForm" class="mt-5 hidden grid gap-3 rounded-lg border border-rose-400/30 bg-rose-400/10 p-4">
        <p class="text-sm font-medium text-rose-100" data-i18n="returnPanel">İade Paneli</p>
        <textarea id="returnReason" rows="3" class="rounded-md border border-rose-300/30 bg-[#070b16] px-3 py-3 text-base text-white outline-none ring-rose-300/50 focus:ring-2" placeholder="İade sebebini açıklayın." data-i18n-placeholder="returnReason"></textarea>
        <button class="rounded-md bg-rose-300 px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-rose-200" data-i18n="submitReturn">İade Talebi Gönder</button>
      </form>

      <section id="chatPanel" class="mt-5 hidden rounded-lg border border-line bg-[#070b16] p-4">
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-base font-semibold text-white" data-i18n="messagePanel">Mesaj Paneli</h2>
          <span class="text-xs text-slate-500" data-i18n="secureChat">Token doğrulandı</span>
        </div>
        <div id="messageList" class="mt-4 grid max-h-72 gap-3 overflow-y-auto"></div>
        <form id="messageForm" class="mt-4 grid gap-3">
          <textarea id="customerMessage" rows="3" class="rounded-md border border-line bg-black/20 px-3 py-3 text-base text-white outline-none ring-cyan/50 focus:ring-2" placeholder="Siparişiniz hakkında mesaj yazın." data-i18n-placeholder="customerMessage"></textarea>
          <button class="rounded-md border border-cyan/40 px-4 py-3 text-sm font-semibold text-cyan transition hover:border-cyan hover:bg-cyan/10" data-i18n="sendMessage">Mesaj Gönder</button>
        </form>
      </section>

      <div id="resultPanel" class="mt-5 hidden rounded-md border border-line bg-black/20 p-4 text-sm"></div>
    </section>
  </main>

  <script>
    const translations = {
      en: {
        subtitle: "Secure Delivery Verification",
        title: "SME-Eye Tracking",
        admin: "Admin",
        orderId: "Order ID",
        deliveryToken: "Delivery token",
        viewStatus: "View Status",
        feedback: "Package arrived safely, or describe any damage.",
        submitFeedback: "Submit Delivery Feedback",
        returnPanel: "Return Panel",
        returnReason: "Explain why you want to return the order.",
        submitReturn: "Submit Return Request",
        messagePanel: "Message Panel",
        secureChat: "Token verified",
        customerMessage: "Write a message about your order.",
        sendMessage: "Send Message",
        sentForApproval: "Your message was received. The suggested reply was sent to the operations team for approval.",
        product: "Product",
        tokenVerified: "Token verified.",
        invalidCredentials: "Order ID and a valid delivery token are required.",
        validationError: "Please check the form fields.",
        tokenTooShort: "Delivery token must be at least 16 characters.",
        feedbackNotReady: "This order is not ready for delivery feedback yet.",
        orderNumber: "Order"
      },
      tr: {
        subtitle: "Güvenli Teslimat Doğrulama",
        title: "SME-Eye Takip",
        admin: "Yönetim",
        orderId: "Sipariş ID",
        deliveryToken: "Teslimat tokeni",
        viewStatus: "Durumu Gör",
        feedback: "Paket sorunsuz geldi veya hasarı açıklayın.",
        submitFeedback: "Teslimat Geri Bildirimi Gönder",
        returnPanel: "İade Paneli",
        returnReason: "İade sebebini açıklayın.",
        submitReturn: "İade Talebi Gönder",
        messagePanel: "Mesaj Paneli",
        secureChat: "Token doğrulandı",
        customerMessage: "Siparişiniz hakkında mesaj yazın.",
        sendMessage: "Mesaj Gönder",
        sentForApproval: "Mesajınız alındı. Önerilen yanıt yetkili onayına gönderildi.",
        product: "Ürün",
        tokenVerified: "Token doğrulandı.",
        invalidCredentials: "Sipariş ID ve geçerli teslimat tokeni gerekli.",
        validationError: "Lütfen form alanlarını kontrol edin.",
        tokenTooShort: "Teslimat tokeni en az 16 karakter olmalı.",
        feedbackNotReady: "Bu sipariş henüz teslimat geri bildirimi için hazır değil.",
        orderNumber: "Sipariş"
      }
    };

    let currentLanguage = localStorage.getItem("smeEyeLanguage") || "tr";

    const statusLabels = {
      en: {
        PENDING: "Pending",
        QUALITY_CHECK: "Quality Check",
        APPROVED: "Approved",
        SHIPPED: "Shipped",
        DELAYED: "Delayed",
        DELIVERED: "Delivered",
        RETURN_INITIATED: "Return Started"
      },
      tr: {
        PENDING: "Bekliyor",
        QUALITY_CHECK: "Kalite Kontrol",
        APPROVED: "Onaylandı",
        SHIPPED: "Kargoda",
        DELAYED: "Gecikti",
        DELIVERED: "Teslim Edildi",
        RETURN_INITIATED: "İade Başlatıldı"
      }
    };

    function t(key) {
      return translations[currentLanguage]?.[key] || translations.en[key] || key;
    }

    function statusText(status) {
      return statusLabels[currentLanguage]?.[status] || status;
    }

    function applyLanguage() {
      document.documentElement.lang = currentLanguage;
      document.getElementById("languageSelect").value = currentLanguage;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
        node.placeholder = t(node.dataset.i18nPlaceholder);
      });
    }

    const statusClasses = {
      PENDING: "border-yellow-300/30 bg-yellow-300/10 text-yellow-100",
      QUALITY_CHECK: "border-orange-300/30 bg-orange-300/10 text-orange-100",
      APPROVED: "border-emerald-300/30 bg-emerald-300/10 text-emerald-100",
      SHIPPED: "border-cyan-300/30 bg-cyan-300/10 text-cyan-100",
      DELAYED: "border-rose-300/30 bg-rose-300/10 text-rose-100",
      DELIVERED: "border-green-300/30 bg-green-300/10 text-green-100",
      RETURN_INITIATED: "border-purple-300/30 bg-purple-300/10 text-purple-100"
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function badge(status) {
      const classes = statusClasses[status] || "border-slate-300/30 bg-slate-300/10 text-slate-100";
      return `<span class="inline-flex rounded-full border px-2.5 py-1 text-xs font-medium ${classes}">${escapeHtml(statusText(status))}</span>`;
    }

    function setResult(message, error = false) {
      const panel = document.getElementById("resultPanel");
      panel.className = `mt-5 rounded-md border bg-black/20 p-4 text-sm whitespace-pre-wrap ${error ? "border-rose-400/50 text-rose-100" : "border-cyan/30 text-slate-100"}`;
      panel.textContent = message;
    }

    function renderMessages(messages = []) {
      const list = document.getElementById("messageList");
      if (!messages.length) {
        list.innerHTML = `<p class="text-sm text-slate-500">${currentLanguage === "tr" ? "Henüz mesaj yok." : "No messages yet."}</p>`;
        return;
      }

      list.innerHTML = messages.map((item) => {
        const isCustomer = item.role === "customer";
        const align = isCustomer ? "justify-self-end border-cyan/30 bg-cyan/10 text-cyan-50" : "justify-self-start border-line bg-black/30 text-slate-100";
        const label = isCustomer ? (currentLanguage === "tr" ? "Siz" : "You") : "SME-Eye";
        return `
          <article class="max-w-[88%] rounded-lg border p-3 ${align}">
            <p class="text-xs text-slate-400">${label}</p>
            <p class="mt-1 text-sm leading-6">${escapeHtml(item.message)}</p>
          </article>
        `;
      }).join("");
      list.scrollTop = list.scrollHeight;
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (Array.isArray(data.detail)) {
          throw new Error(t("validationError"));
        }
        throw new Error(data.detail || JSON.stringify(data));
      }
      return data;
    }

    function credentials() {
      return {
        order_id: Number(document.getElementById("orderId").value),
        crypto_token: document.getElementById("cryptoToken").value
      };
    }

    function validateCredentials() {
      const current = credentials();
      if (!current.order_id || !current.crypto_token) {
        throw new Error(t("invalidCredentials"));
      }
      if (current.crypto_token.length < 16) {
        throw new Error(t("tokenTooShort"));
      }
      return current;
    }

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      currentLanguage = event.target.value;
      localStorage.setItem("smeEyeLanguage", currentLanguage);
      applyLanguage();
    });

    document.getElementById("lookupForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const data = await postJson("/api/tracking/lookup", validateCredentials());
        const panel = document.getElementById("statusPanel");
        panel.className = "mt-5 rounded-lg border border-line bg-[#070b16] p-4";
        panel.innerHTML = `
          <div class="flex items-center justify-between gap-3">
            <p class="font-mono text-sm text-cyan">${escapeHtml(data.order.public_order_code || `${t("orderNumber")} #${data.order.id}`)}</p>
            ${badge(data.order.status)}
          </div>
          <div class="mt-4">
            <p class="text-lg font-semibold text-white">${escapeHtml(data.order.product?.name || t("product"))}</p>
            <p class="mt-1 text-sm text-slate-400">${escapeHtml(data.order.customer_name)}</p>
            <p class="mt-1 text-xs text-slate-500">${escapeHtml(data.order.origin_city)} → ${escapeHtml(data.order.destination_city)}</p>
          </div>
        `;
        document.getElementById("chatPanel").className = "mt-5 rounded-lg border border-line bg-[#070b16] p-4";
        renderMessages(data.messages || []);

        if (["SHIPPED", "DELAYED", "DELIVERED"].includes(data.order.status)) {
          document.getElementById("feedbackForm").className = "mt-5 grid gap-3";
          document.getElementById("returnForm").className = "mt-5 grid gap-3 rounded-lg border border-rose-400/30 bg-rose-400/10 p-4";
          setResult(t("tokenVerified"));
        } else {
          document.getElementById("feedbackForm").className = "mt-5 hidden grid gap-3";
          document.getElementById("returnForm").className = "mt-5 hidden grid gap-3 rounded-lg border border-rose-400/30 bg-rose-400/10 p-4";
          setResult(`${t("tokenVerified")}\n${t("feedbackNotReady")}`);
        }
      } catch (error) {
        document.getElementById("statusPanel").className = "mt-5 hidden rounded-lg border border-line bg-[#070b16] p-4";
        document.getElementById("feedbackForm").className = "mt-5 hidden grid gap-3";
        document.getElementById("returnForm").className = "mt-5 hidden grid gap-3 rounded-lg border border-rose-400/30 bg-rose-400/10 p-4";
        document.getElementById("chatPanel").className = "mt-5 hidden rounded-lg border border-line bg-[#070b16] p-4";
        setResult(error.message, true);
      }
    });

    document.getElementById("feedbackForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const data = await postJson("/api/delivery/confirm", {
          ...validateCredentials(),
          customer_feedback: document.getElementById("customerFeedback").value,
          cargo_rating: Number(document.getElementById("cargoRating").value),
          delivery_confirmed: true,
          language: currentLanguage
        });
        setResult(`${statusText(data.order.status)}\n${data.customer_message}`);
        document.getElementById("statusPanel").querySelector("span").outerHTML = badge(data.order.status);
      } catch (error) {
        setResult(error.message, true);
      }
    });

    document.getElementById("returnForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const data = await postJson("/api/return/request", {
          ...validateCredentials(),
          return_reason: document.getElementById("returnReason").value,
          language: currentLanguage
        });
        setResult(`${statusText(data.order.status)}\n${data.customer_message}`);
        document.getElementById("statusPanel").querySelector("span").outerHTML = badge(data.order.status);
        if (data.order.status === "RETURN_INITIATED") {
          document.getElementById("feedbackForm").className = "mt-5 hidden grid gap-3";
          document.getElementById("returnForm").className = "mt-5 hidden grid gap-3 rounded-lg border border-rose-400/30 bg-rose-400/10 p-4";
        }
      } catch (error) {
        setResult(error.message, true);
      }
    });

    document.getElementById("messageForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const messageInput = document.getElementById("customerMessage");
      if (!messageInput.value.trim()) {
        setResult(currentLanguage === "tr" ? "Mesaj alanı boş olamaz." : "Message cannot be empty.", true);
        return;
      }

      try {
        const data = await postJson("/api/customer/message", {
          ...validateCredentials(),
          message: messageInput.value,
          language: currentLanguage
        });
        renderMessages(data.messages || []);
        messageInput.value = "";
        setResult(t("sentForApproval"));
      } catch (error) {
        setResult(error.message, true);
      }
    });

    applyLanguage();

    const params = new URLSearchParams(window.location.search);
    if (params.get("order_id")) {
      document.getElementById("orderId").value = params.get("order_id");
    }
    if (params.get("token")) {
      document.getElementById("cryptoToken").value = params.get("token");
    }
    if (params.get("order_id") && params.get("token")) {
      document.getElementById("lookupForm").requestSubmit();
    }
  </script>
</body>
</html>
