<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SME-Eye Admin Girişi</title>
  <meta name="description" content="SME-Eye KOBİ operasyon paneli admin giriş sayfası">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: rgba(26, 29, 39, 0.7);
      --surface-solid: #1a1d27;
      --border: rgba(255,255,255,0.08);
      --border-focus: #f59e42;
      --accent: #f59e42;
      --accent-hover: #d4872f;
      --text: #f1f5f9;
      --text-sub: #94a3b8;
      --text-muted: #64748b;
      --input-bg: rgba(15, 17, 23, 0.6);
      --error-bg: rgba(248,113,113,0.1);
      --error-border: rgba(248,113,113,0.3);
      --error-text: #fca5a5;
      --demo-bg: rgba(245,158,66,0.06);
      --demo-text: #94a3b8;
      --gradient-1: #0f1117;
      --gradient-2: #1a1520;
      --gradient-3: #0f1117;
    }

    [data-theme="light"] {
      --bg: #faf8f5;
      --surface: rgba(255, 255, 255, 0.8);
      --surface-solid: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-focus: #e07a1e;
      --accent: #e07a1e;
      --accent-hover: #c2690f;
      --text: #1c1917;
      --text-sub: #57534e;
      --text-muted: #78716c;
      --input-bg: rgba(250, 248, 245, 0.8);
      --error-bg: rgba(220,38,38,0.06);
      --error-border: rgba(220,38,38,0.2);
      --error-text: #dc2626;
      --demo-bg: rgba(224,122,30,0.06);
      --demo-text: #78716c;
      --gradient-1: #faf8f5;
      --gradient-2: #fef3e2;
      --gradient-3: #faf8f5;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--gradient-1) 0%, var(--gradient-2) 50%, var(--gradient-3) 100%);
      background-size: 200% 200%;
      animation: gradientShift 12s ease infinite;
      color: var(--text);
      padding: 1rem;
      transition: background 0.5s ease, color 0.3s ease;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15), 0 0 0 1px var(--border);
      animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #a78bfa, var(--accent));
      background-size: 200% 100%;
      animation: shimmerBar 3s ease infinite;
    }

    @keyframes shimmerBar {
      0%, 100% { background-position: 0% 0; }
      50% { background-position: 200% 0; }
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 16px rgba(245,158,66,0.25);
    }

    .brand-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .login-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-top: 0.5rem;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-sub);
      margin-top: 0.5rem;
      line-height: 1.5;
    }

    .login-form {
      display: grid;
      gap: 0.875rem;
      margin-top: 1.75rem;
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .input-field::placeholder {
      color: var(--text-muted);
    }

    .input-field:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(245,158,66,0.15);
      background: var(--surface-solid);
    }

    .submit-btn {
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 16px rgba(245,158,66,0.3);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(245,158,66,0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .demo-hint {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      background: var(--demo-bg);
      font-size: 0.8rem;
      color: var(--demo-text);
      line-height: 1.5;
    }

    .demo-hint strong {
      color: var(--accent);
      font-weight: 600;
    }

    .error-box {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      font-size: 0.8rem;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      color: var(--text-sub);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, transform 0.2s;
      z-index: 10;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" aria-label="Tema değiştir">🌙</button>

  <main class="login-card">
    <div class="brand-icon">👁️</div>
    <p class="brand-label">SME-Eye</p>
    <h1 class="login-title">Admin Girişi</h1>
    <p class="login-subtitle">Operasyon paneline erişmek için giriş yapın.</p>

    {% if error or request.query_params.get('error') %}
    <div class="error-box">Kullanıcı adı veya şifre hatalı.</div>
    {% endif %}

    <form action="/login" method="post" class="login-form">
      <input name="username" class="input-field" placeholder="Kullanıcı adı" required autocomplete="username">
      <input name="password" type="password" class="input-field" placeholder="Şifre" required autocomplete="current-password">
      <button type="submit" class="submit-btn">Giriş Yap</button>
    </form>

    <div class="demo-hint">
      Demo giriş: <strong>admin</strong> / <strong>admin</strong>
    </div>
  </main>

  <script>
    const currentTheme = localStorage.getItem('smeEyeTheme') || 'light';
    applyTheme(currentTheme);

    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('themeToggle').textContent = '☀️';
      } else {
        document.documentElement.removeAttribute('data-theme');
        document.getElementById('themeToggle').textContent = '🌙';
      }
    }

    function toggleTheme() {
      const current = document.documentElement.hasAttribute('data-theme') ? 'dark' : 'light';
      localStorage.setItem('smeEyeTheme', current);
      applyTheme(current);
    }
  </script>
</body>
</html>
